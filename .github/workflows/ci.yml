name: CI

on:
  push:
    branches-ignore: [] # run CI on every branch push
  pull_request:        # run CI on every PR (regardless of target branch)

jobs:
  ci:
    name: Lint · Type-check · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── pnpm ──────────────────────────────────────────────────────────────
      # Install pnpm before Node so the cache step works correctly
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      # ── Node + pnpm cache ──────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # ── Install ────────────────────────────────────────────────────────────
      # --frozen-lockfile = fail if pnpm-lock.yaml is out of date
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Lint ───────────────────────────────────────────────────────────────
      - name: Lint
        run: pnpm run lint

      # ── Type-check ─────────────────────────────────────────────────────────
      - name: Type-check
        run: pnpm run type-check

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build
        run: pnpm run build

      # ── Security audit ─────────────────────────────────────────────────────
      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

  verify:
    name: Verify MCP tools
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      # Boot the server and run verify in a single step so the
      # backgrounded server isn't killed by SIGHUP when its parent shell
      # exits between steps. Without a token, the verify script only
      # checks tool registration and schemas; with the DIGITALCREW_BEARER_TOKEN
      # repo secret it also runs live read-only API probes.
      - name: Boot server and verify tools
        env:
          DIGITALCREW_API_BASE_URL: ${{ secrets.DIGITALCREW_API_BASE_URL || 'https://max.digitalcrew.tech' }}
          DIGITALCREW_BEARER_TOKEN: ${{ secrets.DIGITALCREW_BEARER_TOKEN || '' }}
        run: |
          set -e
          pnpm run start > server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT

          # Wait up to 60s for the server to accept requests
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000 > /dev/null 2>&1; then
              echo "Server ready after ${i}s (pid $SERVER_PID)"
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "Server process died before becoming ready:"
              cat server.log
              exit 1
            fi
            sleep 1
          done

          if ! curl -fsS http://localhost:3000 > /dev/null 2>&1; then
            echo "Server failed to become ready within 60s:"
            cat server.log
            exit 1
          fi

          node scripts/verify-tools.mjs http://localhost:3000 "$DIGITALCREW_BEARER_TOKEN"
